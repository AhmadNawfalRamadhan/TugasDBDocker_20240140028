spring.application.name=deploy

spring.datasource.url=${DB_URL:jdbc:postgresql://pg-deploy3-ardian-2a57.g.aivencloud.com:18563/defaultdb?sslmode=require}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:AVNS_RDRyDz-9TbFsNFQEurV}
spring.datasource.driver-class-name=org.postgresql.Driver

#hikari con pool

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initializationFailTimeout=60000

#jpa / hibernate

spring.jpa.hibernate.dll-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

#graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s